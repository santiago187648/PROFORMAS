  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

te(1.6);\n  border-bottom:1px solid var(--border);\n}\n.logo-area{display:flex;align-items:center;gap:10px;cursor:pointer}\n.logo-img-h{height:28px;width:auto;display:block}\n.tabs{display:flex;gap:2px}\n.tab{\n  font-family:var(--hv);font-weight:600;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;\n  padding:7px 16px;border-radius:8px;cursor:pointer;border:1px solid transparent;\n  transition:all .18s;color:var(--text-muted);background:transparent;\n}\n.tab:hover{color:var(--text);background:rgba(255,255,255,0.05)}\n.tab.active{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(110,50,230,0.45)}\n\n/* PAGES */\n.page{display:none}.page.active{display:block}\n\n/* HERO */\n.hero{padding:5rem 2rem 4rem;text-align:center;position:relative;display:flex;flex-direction:column;align-items:center}\n.hero-logo-wrap{display:flex;justify-content:center;margin-bottom:2.5rem;animation:float 5s ease-in-out infinite;width:100%}\n@keyframes float{\n  0%,100%{transform:translateY(0);filter:drop-shadow(0 16px 40px rgba(100,30,220,0.45))}\n  50%{transform:translateY(-12px);filter:drop-shadow(0 28px 60px rgba(130,60,255,0.65))}\n}\n.hero-logo-img{height:140px;width:auto;display:block;max-width:220px;object-fit:contain;margin:0 auto}\n.hero-eyebrow{\n  display:inline-flex;align-items:center;gap:6px;margin-bottom:1.4rem;\n  font-family:var(--hv);font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;\n  color:var(--text-muted);padding:5px 16px;border-radius:20px;\n  border:1px solid var(--border);background:rgba(255,255,255,0.03);\n}\n.hero h1{\n  font-family:var(--hv);font-weight:800;\n  font-size:clamp(40px,6vw,74px);line-height:.95;letter-spacing:-2px;\n  margin-bottom:1rem;color:#fff;\n}\n.hero h1 em{\n  font-style:normal;\n  background:linear-gradient(135deg,#c084fc,#818cf8);\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\n}\n.hero-sub{font-size:15px;color:var(--text-muted);max-width:380px;margin:0 auto;line-height:1.7}\n\n/* LAYOUT */\n.app{max-width:1120px;margin:0 auto;padding:2rem 1.5rem 5rem;display:grid;grid-template-columns:1fr 420px;gap:2rem;align-items:start}\n\n/* PANELS */\n.panel{\n  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);\n  overflow:hidden;margin-bottom:1.25rem;backdrop-filter:blur(10px);transition:border-color .2s;\n}\n.panel:hover{border-color:var(--border-h)}\n.panel:last-child{margin-bottom:0}\n.panel-hd{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}\n.pdot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.7;box-shadow:0 0 8px var(--accent)}\n.panel-hd h2{font-family:var(--hv);font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}\n.panel-body{padding:20px}\n\n/* FIELDS */\n.field{margin-bottom:12px}\n.field label{display:block;font-family:var(--hv);font-weight:600;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px}\n.field input,.field textarea,.field select{\n  width:100%;background:var(--input-bg);border:1px solid rgba(255,255,255,0.07);\n  border-radius:var(--radius-sm);color:var(--text);font-family:var(--body);font-size:14px;\n  padding:10px 13px;outline:none;transition:all .18s;\n}\n.field input:focus,.field textarea:focus,.field select:focus{\n  border-color:var(--accent);background:rgba(110,50,230,0.07);\n  box-shadow:0 0 0 3px rgba(110,50,230,0.16);\n}\n.field input::placeholder,.field textarea::placeholder{color:var(--text-dim)}\n.field textarea{resize:vertical;min-height:70px}\n.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n\n/* DIVIDER */\n.sec-div{\n  font-family:var(--hv);font-weight:700;font-size:9px;letter-spacing:2px;text-transform:uppercase;\n  color:var(--text-dim);display:flex;align-items:center;gap:10px;margin:18px 0 12px;\n}\n.sec-div::after{content:'';flex:1;height:1px;background:var(--border)}\n\n/* SVC GRID */\n.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}\n.svc-card{\n  border:1px solid var(--border);border-radius:var(--radius-sm);\n  padding:12px;cursor:pointer;background:var(--input-bg);\n  transition:all .18s;position:relative;\n}\n.svc-card:hover{border-color:var(--border-h);background:rgba(110,50,230,0.07)}\n.svc-card.on{\n  border-color:var(--accent);background:rgba(110,50,230,0.14);\n  box-shadow:0 0 0 1px rgba(110,50,230,0.35),0 0 20px rgba(110,50,230,0.12);\n}\n.svc-card.on .svc-chk{opacity:1}\n.svc-chk{position:absolute;top:7px;right:28px;font-size:10px;color:var(--accent);font-weight:900;opacity:0;transition:opacity .15s}\n.svc-n{font-family:var(--hv);font-weight:700;font-size:12px;color:var(--text);margin-bottom:2px;padding-right:18px}\n.svc-p{font-size:11px;color:var(--text-muted)}\n.svc-del{position:absolute;top:7px;right:8px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:15px;padding:2px 3px;transition:color .15s;z-index:2}\n.svc-del:hover{color:#e04444}\n.svc-qty-row{display:flex;align-items:center;gap:6px;margin-top:8px;border-top:1px solid var(--border);padding-top:7px}\n.svc-qty-lbl{font-size:10px;color:var(--text-muted);font-family:var(--hv);font-weight:700;letter-spacing:1px;flex-shrink:0}\n.svc-qty-inp{width:44px;text-align:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-size:13px;font-weight:700;padding:3px 5px;outline:none;font-family:var(--body)}\n.svc-qty-inp:focus{border-color:var(--accent)}\n.svc-qty-btns{display:flex;flex-direction:column;gap:1px}\n.svc-qty-btn{background:rgba(255,255,255,0.06);border:none;color:#aaa;font-size:9px;cursor:pointer;border-radius:4px;padding:1px 4px;line-height:1.2;transition:all .12s}\n.svc-qty-btn:hover{background:var(--accent);color:#fff}\n\n/* ADD SVC ROWS */\n.asvc-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}\n.asvc-row input{background:var(--input-bg);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);color:var(--text);font-family:var(--body);font-size:13px;padding:9px 12px;outline:none;transition:all .18s;flex:1;min-width:80px}\n.asvc-row input:focus{border-color:var(--accent);background:rgba(110,50,230,0.07)}\n.asvc-row input::placeholder{color:var(--text-dim)}\n.asvc-row .asp{width:88px;flex:none}.asvc-row .asu{width:78px;flex:none}\n.cus-row{display:flex;gap:6px;margin-bottom:7px}\n.cus-row input{background:var(--input-bg);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius-sm);color:var(--text);font-family:var(--body);font-size:13px;padding:9px 12px;outline:none;transition:all .18s}\n.cus-row input:focus{border-color:var(--accent);background:rgba(110,50,230,0.07)}\n.cus-row input::placeholder{color:var(--text-dim)}\n.cus-row .cus-name{flex:1}.cus-row .cus-price{width:92px}\n.btn-add{padding:9px 14px;background:transparent;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-sm);color:var(--text-muted);font-family:var(--hv);font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s}\n.btn-add:hover{border-color:var(--accent);color:var(--accent)}\n.cus-list{margin-bottom:4px}\n.ci{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text);padding:5px 2px;border-bottom:1px solid var(--border)}\n.ci:last-child{border-bottom:none}\n.ci button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;transition:color .15s}\n.ci button:hover{color:#e04444}\n\n/* GEN BUTTON */\n.btn-gen{\n  width:100%;padding:15px;\n  background:linear-gradient(135deg,#8B3CF7,#6420D0);\n  color:#fff;border:none;border-radius:12px;\n  font-family:var(--hv);font-weight:700;font-size:15px;letter-spacing:.5px;\n  cursor:pointer;margin-top:14px;transition:all .22s;\n  box-shadow:0 4px 24px rgba(100,30,220,0.38);\n}\n.btn-gen:hover{background:linear-gradient(135deg,#9B4CF7,#7430E0);transform:translateY(- CO -->\n<div class=\"modal-overlay\" id=\"bancoModalOverlay\" style=\"display:none\">\n  <div class=\"modal-box\">\n    <div class=\"modal-title\" id=\"bancoModalTitle\">Nueva cuenta bancaria<\u002Fdiv>\n    <div class=\"field\"><label>Banco<\u002Flabel><input id=\"b-banco\" placeholder=\"Ej: Banco Pichincha\"><\u002Fdiv>\n    <div class=\"field\"><label>Titular<\u002Flabel><input id=\"b-titular\" placeholder=\"Nombre del titular\"><\u002Fdiv>\n    <div class=\"field\"><label>N° de Cuenta<\u002Flabel><input id=\"b-cuenta\" placeholder=\"Ej: 2200123456\"><\u002Fdiv>\n    <div class=\"row2\">\n      <div class=\"field\"><label>Tipo<\u002Flabel>\n        <select id=\"b-tipo\"><option value=\"Corriente\">Corriente<\u002Foption><option value=\"Ahorros\">Ahorros<\u002Foption><\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"field\"><label>Cédula/RUC<\u002Flabel><input id=\"b-cedula\" placeholder=\"Ej: 0702345678\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"field\"><label>Email (opcional)<\u002Flabel><input id=\"b-email\" type=\"email\" placeholder=\"correo@banco.com\"><\u002Fdiv>\n    <div class=\"field\"><label>Color tarjeta<\u002Flabel>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:6px\" id=\"colorPicker\">\n        <div class=\"color-dot active\" data-color=\"#9B6DFF\" style=\"background:#9B6DFF\" onclick=\"pickColor(this)\"><\u002Fdiv>\n        <div class=\"color-dot\" data-color=\"#7B2FFF\" style=\"background:#7B2FFF\" onclick=\"pickColor(this)\"><\u002Fdiv>\n        <div class=\"color-dot\" data-color=\"#FF6B35\" style=\"background:#FF6B35\" onclick=\"pickColor(this)\"><\u002Fdiv>\n        <div class=\"color-dot\" data-color=\"#00C4CC\" style=\"background:#00C4CC\" onclick=\"pickColor(this)\"><\u002Fdiv>\n        <div class=\"color-dot\" data-color=\"#2ECC71\" style=\"background:#2ECC71\" onclick=\"pickColor(this)\"><\u002Fdiv>\n        <div class=\"color-dot\" data-color=\"#E74C3C\" style=\"background:#E74C3C\" onclick=\"pickColor(this) e  = cfg.slogan;\n  document.getElementById('cfg-city').value    = cfg.city;\n  document.getElementById('cfg-phone').value   = cfg.phone;\n  document.getElementById('cfg-email').value   = cfg.email;\n  document.getElementById('cfg-social').value  = cfg.social;\n  document.getElementById('cfg-prefix').value  = cfg.prefix;\n  applyLogo();\n}\nfunction saveSettings() {\n  cfg.company = document.getElementById('cfg-company').value.trim() || cfg.company;\n  cfg.slogan  = document.getElementById('cfg-slogan').value.trim()  || cfg.slogan;\n  cfg.city    = document.getElementById('cfg-city').value.trim()    || cfg.city;\n  cfg.phone   = document.getElementById('cfg-phone').value.trim()   || cfg.phone;\n  cfg.email   = document.getElementById('cfg-email').value.trim()   || cfg.email;\n  cfg.social  = document.getElementById('cfg-social').value.trim()  || cfg.social;\n  cfg.prefix  = document.getElementById('cfg-prefix').value.trim()  || cfg.prefix;\n  saveCfg();\n  document.getElementById('footInfo').textContent = cfg.company+' · '+cfg.city+' · '+cfg.email;\n  document.getElementById('heroEye').textContent  = cfg.company+' · '+cfg.city;\n  toast('Ajustes guardados');\n}\nfunction saveCfg() { localStorage.setItem('bh_cfg', JSON.stringify(cfg)); }\n\nfunction saveSvcs() { localStorage.setItem('bh_svcs', JSON.stringify(SVCS)); }\nfunction initGrid() {\n  document.getElementById('svcGrid').innerHTML = SVCS.map((s,i) =>\n    `<div class=\"svc-card\" id=\"s${i}\" onclick=\"tog(${i})\">\n      <span class=\"svc-chk\">✓<\u002Fspan>\n      <button class=\"svc-del\" onclick=\"delSvc(event,${i})\">×<\u002Fbutton>\n      <div class=\"svc-n\">${s.n}<\u002Fdiv>\n      <div class=\"svc-p\">$${s.p.toLocaleString()} / ${s.u}<\u002Fdiv>\n      <div class=\"svc-qty-row\" onclick=\"event.stopPropagation()\">\n        <span class=\"svc-qty-lbl\">Cant.:<\u002Fspan>\n        <input class=\"svc-qty-inp\" id=\"qty${i}\" type=\"number\" min=\"1\" max=\"99\" value=\"1\" onchange=\"clampQty(this)\">\n        <div class=\"svc-qty-btns\">\n          <button class=\"svc-qty-btn\" onclick=\"changeQty(${i},1)\">▲<\u002Fbutton>\n          <button class=\"svc-qty-btn\" onclick=\"changeQty(${i},-1)\">▼<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`\n  ).join('');\n  sel.forEach(i => { const el=document.getElementById('s'+i); if(el) el.classList.add('on'); });\n}\nfunction clampQty(inp){let v=parseInt(inp.value)||1;if(v<1)v=1;if(v>99)v=99;inp.value=v;}\nfunction changeQty(i,delta){const inp=document.getElementById('qty'+i);if(!inp)return;let v=(parseInt(inp.value)||1)+delta;if(v<1)v=1;if(v>99)v=99;inp.value=v;}\nfunction getQty(i){const inp=document.getElementById('qty'+i);return inp?Math.max(1,parseInt(inp.value)||1):1;}\nfunction tog(i) { i=Number(i); sel.has(i)?sel.delete(i):sel.add(i); document.getElementById('s'+i).classList.toggle('on',sel.has(i)); }\nfunction delSvc(e,i) {\n  e.stopPropagation();\n  if(!confirm('¿Eliminar \"'+SVCS[i].n+'\" del catálogo?')) return;\n  const ns=new Set(); sel.forEach(v=>{if(v<i)ns.add(v);else if(v>i)ns.add(v-1);});\n  sel=ns; SVCS.splice(i,1); saveSvcs(); initGrid(); toast('Servicio eliminado');\n}\nfunction addSvc() {\n  const n=document.getElementById('asvN').value.trim();\n  const p=parseFloat(document.getElementById('asvP').value);\n  const u=document.getElementById('asvU').value.trim()||'servicio';\n  if(!n||isNaN(p)||p<=0){toast('Completa nombre y precio');return;}\n  SVCS.push({n,p,u}); saveSvcs();\n  document.getElementById('asvN').value=''; document.getElementById('asvP').value=''; document.getElementById('asvU').value='';\n  initGrid(); toast('Servicio agregado');\n}\nfunction addCustom() {\n  const n=document.getElementById('cusN').value.trim();\n  const p=parseFloat(document.getElementById('cusP').value);\n  const uEl=document.getElementById('cusU');\n  const u=uEl?uEl.value.trim()||'servicio':'servicio';\n  if(!n||isNaN(p)||p<=0){toast('Completa nombre y precio');return;}\n  custom.push({n,p,u});\n  document.getElementById('cusN').value='';\n  document.getElementById('cusP').value='';\n  if(uEl) uEl.value='';\n  renderCus();\n}\nfunction removeC(i){custom.splice(i,1);renderCus();}\nfunction renderCus(){\n  document.getElementById('cusList').innerHTML=custom.map((c,i)=>\n    `<div class=\"ci\"><span>${c.n} — <strong>$${c.p.toLocaleString()}<\u002Fstrong><\u002Fspan><button onclick=\"removeC(${i})\">×<\u002Fbutton><\u002Fdiv>`\n  ).join('');\n}\nfunction fmt(n){return '$'+n.toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});}\n\nfunction generate() {\n  const cn=document.getElementById('cn').value.trim()||'Cliente';\n  const ce=document.getElementById('ce').value.trim()||'—';\n  const ct=document.getElementById('ct').value.trim()||'—';\n  const cc=document.getElementById('cc').value.trim()||'—';\n  const cid=document.getElementById('cid').value.trim()||'—';\n  const proj=document.getElementById('proj').value.trim()||'Servicio audiovisual';\n  const evD=document.getElementById('evDate').value;\n  const noteExtra = buildProdNote();\n  const noteUser = document.getElementById('noteT').value.trim();\n  const note = [noteExtra, noteUser].filter(Boolean).join('\\n');\n  const discVal=parseFloat(document.getElementById('disc').value)||0;\n  const discMode=window._discMode||'pct';\n  const disc=discVal;\n  const evFmt=evD?new Date(evD+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'}):'—';\n  const qDate=new Date().toLocaleDateString('es-EC',{day:'2-digit',month:'long',year:'numeric'});\n  const qNum=cfg.prefix+'-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000+1000));\n  let items=[]; sel.forEach(i=>{const qty=getQty(i);items.push({n:SVCS[i].n,p:SVCS[i].p,u:SVCS[i].u,qty});});custom.forEach(c=>items.push({n:c.n,p:c.p,u:c.u||'servicio',qty:1}));\n  if(!items.length){toast('Selecciona al menos un servicio');return;}\n  const sub=items.reduce((a,b)=>a+(b.p*b.qty),0);\n  const dAmt=discMode==='pct' ? sub*(discVal/100) : Math.min(discVal, sub);\n  const total=sub-dAmt;\n  const discLabel=discMode==='pct' ? discVal+'%' : fmt(discVal);\n  const logoHtml=`<img src=\"${cfg.logo}\" class=\"q-logo-img\" alt=\"Logo\">`;\n  const waMsg='Hola '+cn+'\\n\\nAdjunto la cotización *'+qNum+'* de *'+cfg.company+'* para el proyecto *'+proj+'*.\\n\\n'+items.map(it=>(it.qty>1?it.qty+'× ':'')+it.n+': '+fmt(it.p*it.qty)).join('\\n')+(dAmt>0?'\\n• Descuento ('+discLabel+'): -'+fmt(dAmt):'')+('\\n\\n*TOTAL: '+fmt(total)+'*\\n\\n')+(note?'Nota: '+note+'\\n\\n':'')+cfg.email+' · '+cfg.social;\n  // Build rows with 3 columns: Descripción | Precio unit. | Total\n  const rows=items.map(it=>`<div class=\"q-row\"><div><div class=\"q-rn\">${it.n}<\u002Fdiv><div class=\"q-ru\">${it.qty>1?it.qty+' × $'+it.p.toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2})+' c/u':'1 '+it.u}<\u002Fdiv><\u002Fdiv><div class=\"q-rp-unit\">${fmt(it.p)}<\u002Fdiv><div class=\"q-rp\">${fmt(it.p*it.qty)}<\u002Fdiv><\u002Fdiv>`).join('');\n  // Status from saved record (default pendiente)\n  const statusLabel={'pendiente':'⏳ Pendiente de pago','enviada':'📤 Enviada','aceptada':'✅ Aceptada','pagado':'✅ Pagado','rechazada':'❌ Rechazada'};\n  const curStatus='pendiente';\n  const statusClass=curStatus;\n  // Enhanced WhatsApp message with status\n  const waMsgFull='Hola '+cn+',\\n\\n📋 *PROFORMA '+qNum+'*\\n'+'━'.repeat(28)+'\\n\\n'+'🏢 Empresa: '+cfg.company+'\\n'+'📁 Proyecto: '+proj+'\\n'+'📅 Fecha evento: '+evFmt+'\\n\\n'+'*SERVICIOS:*\\n'+items.map(it=>'  • '+(it.qty>1?it.qty+'× ':'')+it.n+': '+fmt(it.p*it.qty)).join('\\n')+(dAmt>0?'\\n\\n💰 Descuento ('+discLabel+'): -'+fmt(dAmt):'')+('\\n\\n'+'━'.repeat(28)+'\\n💵 *TOTAL: '+fmt(total)+'*\\n'+'━'.repeat(28))+'\\n\\n🔔 *Estado: PENDIENTE DE PAGO*'+(note?'\\n\\n📝 Nota: '+note:'')+'\\n\\n'+cfg.email+' | '+cfg.social;\n  window._lastWaMsg = waMsgFull;\n  // Build chip summary with emojis for proforma\n  const chipParts=[];\n  if(chipValues.fm) chipParts.push('👨‍🎬 '+chipValues.fm);\n  if(chipValues.eq) chipParts.push('🎥 '+chipValues.eq);\n  if(chipValues.en) chipParts.push('📅 '+chipValues.en);\n  if(chipValues.cc) chipParts.push('🔄 '+chipValues.cc);\n  if(chipValues.fmt) chipParts.push('📦 '+chipValues.fmt);\n  if(chipValues.inc&&chipValues.inc.length) chipParts.push('✅ Incluye: '+chipValues.inc.join(', '));\n  const chipNoteHtml = chipParts.length ? `<div class=\"q-note\" style=\"line-height:1.9\">${chipParts.map(p=>'<div>'+p+'<\u002Fdiv>').join('')}${noteUser?'<div style=\"margin-top:6px;padding-top:6px;border-top:1px solid rgba(0,0,0,0.08)\">📝 '+noteUser+'<\u002Fdiv>':''}<\u002Fdiv>` : (noteUser?`<div class=\"q-note\">📝 <strong>Nota:<\u002Fstrong> ${noteUser}<\u002Fdiv>`:'');\n  document.getElementById('qCard').innerHTML=`\n    <div class=\"q-top\">\n      <div>${logoHtml}<\u002Fdiv>\n      <div class=\"q-top-right\">\n        <div class=\"q-invoice-title\">PROFORMA<\u002Fdiv>\n        <div class=\"q-num-val\">${qNum}<\u002Fdiv>\n        <div class=\"q-date-val\">${qDate}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"q-meta\">\n      <div>\n        <div class=\"qmi\"><label>Cliente<\u002Flabel><p>${cn}<\u002Fp><\u002Fdiv>\n        <div class=\"qmi\" style=\"margin-top:6px\"><label>Identificación<\u002Flabel><p>${cid}<\u002Fp><\u002Fdiv>\n        <div class=\"qmi\" style=\"margin-top:6px\"><label>Ciudad<\u002Flabel><p>${cc}<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right\">\n        <div class=\"qmi\"><label>Correo<\u002Flabel><p style=\"font-size:11px\">${ce}<\u002Fp><\u002Fdiv>\n        <div class=\"qmi\" style=\"margin-top:6px\"><label>Teléfono<\u002Flabel><p>${ct}<\u002Fp><\u002Fdiv>\n        <div class=\"qmi\" style=\"margin-top:6px\"><label>Proyecto<\u002Flabel><p>${proj}<\u002Fp><\u002Fdiv>\n        <div class=\"qmi\" style=\"margin-top:6px\"><label>Fecha del evento<\u002Flabel><p>${evFmt}<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"q-items\">\n      <div class=\"q-thead\"><span>Descripción<\u002Fspan><span style=\"text-align:right\">Precio<\u002Fspan><span style=\"text-align:right\">Subtotal<\u002Fspan><\u002Fdiv>\n      ${rows}\n    <\u002Fdiv>\n    <div class=\"q-totals\">\n      <div class=\"q-sub-row\"><span>Subtotal<\u002Fspan><span>${fmt(sub)}<\u002Fspan><\u002Fdiv>\n      ${dAmt>0?`<div class=\"q-disc-row\"><span>Descuento (${discLabel})<\u002Fspan><span>-${fmt(dAmt)}<\u002Fspan><\u002Fdiv>`:''}\n      <div class=\"q-tot-row\">\n        <span class=\"q-tot-lbl\">Total a Pagar<\u002Fspan>\n        <span class=\"q-tot-val\">${fmt(total)}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"q-status-row\">\n        <span style=\"font-size:10px;color:#bbb;font-family:var(--hv)\">Estado del proyecto<\u002Fspan>\n        <span class=\"q-status-badge ${statusClass}\" id=\"qStatusBadge\">${statusLabel[curStatus]}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${chipNoteHtml}\n    <div class=\"q-actions\">\n      <button class=\"btn-pdf\" onclick=\"window.print()\">📄 Exportar PDF<\u002Fbutton>\n      <button class=\"btn-wa\" onclick=\"openWA()\">💬 WhatsApp<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"q-footer-txt\">${cfg.company} · ${cfg.email} · ${cfg.social}<\u002Fdiv>`;\n  clients.unshift({id:Date.now(),qNum,cn,ce,ct,cc,cid,proj,total,disc,items:items.map(i=>(i.qty>1?i.qty+'× ':'')+i.n).join(', '),date:new Date().toISOString(),status:'pendiente'});\n  localStorage.setItem('bh_clients',JSON.stringify(clients));\n  toast('Cotización generada y guardada');\n  const _qc=document.getElementById('qCard'); const _top=_qc.getBoundingClientRect().top+window.pageYOffset-80; window.scrollTo({top:_top,behavior:'smooth'});\n}\n\nfunction updateStats() {\n  const now=new Date();\n  const tm=clients.filter(c=>{const d=new Date(c.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});\n  document.getElementById('statClients').textContent=new Set(clients.map(c=>c.ce.toLowerCase())).size;\n  document.getElementById('statQuotes').textContent=clients.length;\n  document.getElementById('statTotal').textContent=fmt(clients.reduce((a,b)=>a+b.total,0));\n  document.getElementById('statMonth').textContent=fmt(tm.reduce((a,b)=>a+b.total,0));\n}\nfunction renderClients() {\n  const q=(document.getElementById('searchBar').value||'').toLowerCase();\n  const f=clients.filter(c=>c.cn.toLowerCase().includes(q)||c.ce.toLowerCase().includes(q)||c.proj.toLowerCase().includes(q)||c.qNum.toLowerCase().includes(q));\n  const wrap=document.getElementById('clientsWrap');\n  if(!f.length){wrap.innerHTML=`<div class=\"no-clients\"><div class=\"no-clients-ico\">📋<\u002Fdiv><div class=\"no-clients-t\">${clients.length===0?'Aún no hay clientes registrados':'Sin resultados'}<\u002Fdiv><div class=\"no-clients-s\">${clients.length===0?'Cada cotización que generes se guardará aquí automáticamente':'Intenta con otro término'}<\u002Fdiv><\u002Fdiv>`;return;}\n  wrap.innerHTML=`<table class=\"clients-table\">\n    <thead><tr><th>Cliente<\u002Fth><th>Proyecto<\u002Fth><th>N° Cot.<\u002Fth><th>Fecha<\u002Fth><th>Estado<\u002Fth><th>Total<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>${f.map(c=>`<tr>\n      <td><div class=\"ct-name\">${c.cn}<\u002Fdiv><div class=\"ct-sub\">${c.ce}<\u002Fdiv><\u002Ftd>\n      <td><div style=\"font-size:12px\">${c.proj}<\u002Fdiv><div class=\"ct-sub\">${c.items.split(',').slice(0,2).join(', ')}${c.items.split(',').length>2?'…':''}<\u002Fdiv><\u002Ftd>\n      <td><span style=\"font-size:11px;color:var(--muted)\">${c.qNum}<\u002Fspan><\u002Ftd>\n      <td><span style=\"font-size:11px;color:var(--muted)\">${new Date(c.date).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'})}<\u002Fspan><\u002Ftd>\n      <td><select class=\"status-sel\" onchange=\"changeStatus(${c.id},this.value)\">\n        <option value=\"pendiente\" ${c.status==='pendiente'?'selected':''}>⏳ Pendiente<\u002Foption>\n        <option value=\"enviada\"   ${c.status==='enviada'?'selected':''}>✅ Enviada<\u002Foption>\n        <option value=\"aceptada\"  ${c.status==='aceptada'?'selected':''}>🎉 Aceptada<\u002Foption>\n        <option value=\"rechazada\" ${c.status==='rechazada'?'selected':''}>❌ Rechazada<\u002Foption>\n      <\u002Fselect><\u002Ftd>\n      <td><div class=\"ct-total\">${fmt(c.total)}<\u002Fdiv><\u002Ftd>\n      <td><button class=\"ct-del\" onclick=\"deleteClient(${c.id})\">×<\u002Fbutton><\u002Ftd>\n    <\u002Ftr>`).join('')}<\u002Ftbody>\n  <\u002Ftable>`;\n}\nfunction changeStatus(id,status){const c=clients.find(x=>x.id===id);if(c){c.status=status;localStorage.setItem('bh_clients',JSON.stringify(clients));}}\nfunction deleteClient(id){if(!confirm('¿Eliminar este registro?'))return;clients=clients.filter(c=>c.id!==id);localStorage.setItem('bh_clients',JSON.stringify(clients));updateStats();renderClients();toast('Registro eliminado');}\nfunction clearAll(){if(!confirm('¿Eliminar TODOS los registros?'))return;clients=[];localStorage.setItem('bh_clients',JSON.stringify(clients));updateStats();renderClients();toast('Registros eliminados');}\nfunction exportCSV(){\n  if(!clients.length){toast('No hay clientes para exportar');return;}\n  const h=['N° Cotización','Cliente','Identificación','Correo','Teléfono','Ciudad','Proyecto','Servicios','Descuento %','Total','Estado','Fecha'];\n  const rows=clients.map(c=>[c.qNum,c.cn,c.cid||'—',c.ce,c.ct,c.cc,c.proj,`\"${c.items}\"`,c.disc,c.total,c.status,new Date(c.date).toLocaleDateString('es-EC')]);\n  const csv=[h,...rows].map(r=>r.join(',')).join('\\n');\n  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));\n  a.download='clientes_beehappy_'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('CSV exportado');\n}\nfunction openWA(){\n  const msg = window._lastWaMsg;\n  if(!msg){toast('Primero genera una cotización');return;}\n  const url = 'https://api.whatsapp.com/send?text='+encodeURIComponent(msg);\n  window.open(url,'_blank');\n}\nfunction toast(msg){const t=document.getElementById('toast');t.textContent='✓ '+msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}\n\ninitGrid(); applyLogo();\n// Set today's date as default\n(function(){\n  const today = new Date();\n  const y = today.getFullYear();\n  const m = String(today.getMonth()+1).padStart(2,'0');\n  const d = String(today.getDate()).padStart(2,'0');\n  const el = document.getElementById('evDate');\n  if(el) el.value = y+'-'+m+'-'+d;\n})();\n// Discount mode toggle\nwindow._discMode = 'pct';\nfunction setDiscMode(mode){\n  window._discMode = mode;\n  const btnP = document.getElementById('discBtnPct');\n  const btnA = document.getElementById('discBtnAmt');\n  if(!btnP||!btnA) return;\n  if(mode==='pct'){\n    btnP.style.background='var(--accent)'; btnP.style.color='#ffffff';\n    btnA.style.background='transparent'; btnA.style.color='#888';\n    document.getElementById('disc').max='100';\n    document.getElementById('disc').placeholder='0';\n  } else {\n    btnA.style.background='var(--accent)'; btnA.style.color='#ffffff';\n    btnP.style.background='transparent'; btnP.style.color='#888';\n    document.getElementById('disc').max='9999999';\n    document.getElementById('disc').placeholder='0.00';\n  }\n}\ndocument.getElementById('footInfo').textContent=cfg.company+' · '+cfg.city+' · '+cfg.email;\ndocument.getElementById('heroEye').textContent=cfg.company+' · '+cfg.city;\n\n<\u002Fscript>\n<script>\n// COLOR CUSTOMIZER\nfunction toggleColorPanel(){\n  document.getElementById('colorPanel').classList.toggle('open');\n}\nfunction setColor(hex, el){\n  document.documentElement.style.setProperty('--accent', hex);\n  document.documentElement.style.setProperty('--accent-dark', hex);\n  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));\n  if(el) el.classList.add('active');\n  const cp = document.getElementById('customColorPicker');\n  if(cp) cp.value = hex;\n  const dot = document.getElementById('cpDot');\n  const hexEl = document.getElementById('cpHex');\n  if(dot) dot.style.background = hex;\n  if(hexEl) hexEl.textContent = hex.toUpperCase();\n  // Actualizar borde del FAB\n  const fab = document.getElementById('fabBtn');\n  if(fab) fab.style.borderColor = hex;\n  localStorage.setItem('bh_accent', hex);\n}\n// Load saved color\nconst savedColor = localStorage.getItem('bh_accent') || '#7B2FFF';\nif(savedColor){ setColor(savedColor, null); }\n// Close panel on outside\ndocument.addEventListener('click', e => {\n  const fab = document.querySelector('.color-picker-fab');\n  if (fab && !fab.contains(e.target)) {\n    document.getElementById('colorPanel').classList.remove('open');\n  }\n});\n\n/* ============================================================\n   CHIPS DE PRODUCCIÓN\n   ============================================================ */\nconst chipValues = { fm:'', eq:'', en:'', cc:'', fmt:'', inc:[] };\n\nfunction setChip(group, el, val) {\n  // Toggle: if already active, deselect\n  if (el.classList.contains('active')) {\n    el.classList.remove('active');\n    chipValues[group] = '';\n    updateChipPreview();\n    return;\n  }\n  document.querySelectorAll('#chips-'+group+' .chip:not(.chip-add-opt)').forEach(c => c.classList.remove('active'));\n  el.classList.add('active');\n  chipValues[group] = val;\n  updateChipPreview();\n}\n\nfunction toggleChip(group, el, val) {\n  el.classList.toggle('active');\n  if (el.classList.contains('active')) {\n    if (!chipValues[group].includes(val)) chipValues[group].push(val);\n  } else {\n    chipValues[group] = chipValues[group].filter(v => v !== val);\n  }\n  updateChipPreview();\n}\n\nfunction updateChipPreview() {\n  const parts = [];\n  if (chipValues.fm) parts.push('👨‍🎬 '+chipValues.fm);\n  if (chipValues.eq) parts.push('🎥 '+chipValues.eq);\n  if (chipValues.en) parts.push('📅 '+chipValues.en);\n  if (chipValues.cc) parts.push('🔄 '+chipValues.cc);\n  if (chipValues.fmt) parts.push('📦 '+chipValues.fmt);\n  if (chipValues.inc.length) parts.push('✅ Incluye: '+chipValues.inc.join(', '));\n  // custom categories\n  Object.keys(chipValues).forEach(k => {\n    if (!['fm','eq','en','cc','fmt','inc'].includes(k)) {\n      const catEl = document.getElementById('cat-label-'+k);\n      const catName = catEl ? catEl.textContent.trim() : k;\n      const val = chipValues[k];\n      if (Array.isArray(val) && val.length) parts.push(catName+': '+val.join(', '));\n      else if (val) parts.push(catName+': '+val);\n    }\n  });\n\n  const prev = document.getElementById('chipPreview');\n  const txt = document.getElementById('chipPreviewText');\n  if (parts.length > 0) {\n    prev.style.display = 'block';\n    txt.innerHTML = parts.map(p => '<div>'+p+'<\u002Fdiv>').join('');\n  } else {\n    prev.style.display = 'none';\n  }\n}\n\n/* ============================================================\n   PRODUCCIÓN — EDICIÓN DINÁMICA DE CATEGORÍAS Y OPCIONES\n   ============================================================ */\nlet _addOptCatId = null;\nlet _addOptCatType = 'single';\n\nfunction openAddOptionModal(catId, catType) {\n  _addOptCatId = catId;\n  _addOptCatType = catType;\n  const catLabelEl = document.getElementById('cat-label-' + catId);\n  const catName = catLabelEl ? catLabelEl.textContent.trim() : catId;\n  document.getElementById('addOptModalTitle').textContent = 'Nueva opción — ' + catName;\n  document.getElementById('newOptLabel').value = '';\n  document.getElementById('newOptDesc').value = '';\n  document.getElementById('addOptionModal').style.display = 'flex';\n  setTimeout(() => document.getElementById('newOptLabel').focus(), 100);\n}\n\nfunction closeAddOptionModal() {\n  document.getElementById('addOptionModal').style.display = 'none';\n}\n\nfunction saveNewOption() {\n  const label = document.getElementById('newOptLabel').value.trim();\n  const desc = document.getElementById('newOptDesc').value.trim();\n  if (!label) { toast('Escribe la etiqueta del chip'); return; }\n  const desc2 = desc || label;\n  const container = document.getElementById('chips-' + _addOptCatId);\n  if (!container) return;\n  const addBtn = container.querySelector('.chip-add-opt');\n  const btn = document.createElement('button');\n  const catType = _addOptCatType;\n  const catId = _addOptCatId;\n  if (catType === 'multi') {\n    btn.className = 'chip chip-toggle';\n    btn.textContent = label;\n    btn.onclick = function() { toggleChip(catId, btn, desc2); };\n  } else {\n    btn.className = 'chip';\n    btn.textContent = label;\n    btn.onclick = function() { setChip(catId, btn, desc2); };\n  }\n  // add delete on right-click\n  btn.title = 'Clic para seleccionar · Clic derecho para eliminar';\n  btn.addEventListener('contextmenu', function(e) {\n    e.preventDefault();\n    if (confirm('¿Eliminar esta opción \"' + label + '\"?')) {\n      btn.remove();\n      // clear value if selected\n      if (catType === 'multi') {\n        if (Array.isArray(chipValues[catId])) {\n          chipValues[catId] = chipValues[catId].filter(v => v !== desc2);\n        }\n      } else {\n        if (chipValues[catId] === desc2) chipValues[catId] = '';\n      }\n      updateChipPreview();\n    }\n  });\n  container.insertBefore(btn, addBtn);\n  closeAddOptionModal();\n  toast('Opción \"' + label + '\" agregada');\n}\n\nfunction openAddCategoryModal() {\n  document.getElementById('newCatLabel').value = '';\n  document.getElementById('newCatOpt1Label').value = '';\n  document.getElementById('newCatOpt1Desc').value = '';\n  document.getElementById('newCatType').value = 'single';\n  document.getElementById('addCategoryModal').style.display = 'flex';\n  setTimeout(() => document.getElementById('newCatLabel').focus(), 100);\n}\n\nfunction closeAddCategoryModal() {\n  document.getElementById('addCategoryModal').style.display = 'none';\n}\n\nfunction saveNewCategory() {\n  const label = document.getElementById('newCatLabel').value.trim();\n  const catType = document.getElementById('newCatType').value;\n  const opt1Label = document.getElementById('newCatOpt1Label').value.trim();\n  const opt1Desc = document.getElementById('newCatOpt1Desc').value.trim();\n  if (!label) { toast('Escribe el nombre de la categoría'); return; }\n  // generate unique id\n  const catId = 'cat_' + Date.now();\n  // init chipValues\n  chipValues[catId] = catType === 'multi' ? [] : '';\n  // build row\n  const area = document.getElementById('prodChipsArea');\n  const row = document.createElement('div');\n  row.className = 'prod-row';\n  row.setAttribute('data-cat-id', catId);\n  row.innerHTML = `\n    <div class=\"prod-label-wrap\" style=\"display:flex;align-items:center;gap:4px;min-width:95px;flex-shrink:0\">\n      <span class=\"prod-label\" id=\"cat-label-${catId}\" style=\"cursor:pointer\" title=\"Clic para editar\" onclick=\"startEditCategoryLabel('${catId}')\">${label}<\u002Fspan>\n      <button onclick=\"deleteProdCategory('${catId}')\" title=\"Eliminar categoría\" style=\"background:none;border:none;color:#555;cursor:pointer;font-size:12px;padding:1px 3px;line-height:1;flex-shrink:0\" onmouseover=\"this.style.color='#e04444'\" onmouseout=\"this.style.color='#555'\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"prod-chips\" id=\"chips-${catId}\">\n      <button class=\"chip chip-add-opt\" onclick=\"openAddOptionModal('${catId}','${catType}')\" title=\"Agregar opción\" style=\"background:rgba(123,47,255,0.08);border-color:rgba(123,47,255,0.3);color:var(--accent);font-size:14px;padding:2px 8px\">+<\u002Fbutton>\n    <\u002Fdiv>\n  `;\n  area.appendChild(row);\n  closeAddCategoryModal();\n  // add first option if provided\n  if (opt1Label) {\n    _addOptCatId = catId;\n    _addOptCatType = catType;\n    document.getElementById('newOptLabel').value = opt1Label;\n    document.getElementById('newOptDesc').value = opt1Desc || opt1Label;\n    saveNewOption();\n  } else {\n    toast('Categoría \"' + label + '\" creada');\n  }\n}\n\nfunction deleteProdCategory(catId) {\n  const row = document.querySelector('[data-cat-id=\"' + catId + '\"]');\n  const labelEl = document.getElementById('cat-label-' + catId);\n  const catName = labelEl ? labelEl.textContent.trim() : catId;\n  if (!confirm('¿Eliminar la categoría \"' + catName + '\" y todas sus opciones?')) return;\n  if (row) row.remove();\n  delete chipValues[catId];\n  updateChipPreview();\n  toast('Categoría eliminada');\n}\n\nfunction startEditCategoryLabel(catId) {\n  const span = document.getElementById('cat-label-' + catId);\n  if (!span) return;\n  const current = span.textContent.trim();\n  const input = document.createElement('input');\n  input.value = current;\n  input.style.cssText = 'width:90px;background:var(--input-bg);border:1.5px solid var(--accent);border-radius:6px;color:var(--text);font-size:11px;padding:3px 6px;outline:none;font-family:var(--body)';\n  span.replaceWith(input);\n  input.focus();\n  input.select();\n  function finishEdit() {\n    const newLabel = input.value.trim() || current;\n    const newSpan = document.createElement('span');\n    newSpan.className = 'prod-label';\n    newSpan.id = 'cat-label-' + catId;\n    newSpan.style.cursor = 'pointer';\n    newSpan.title = 'Clic para editar';\n    newSpan.onclick = function() { startEditCategoryLabel(catId); };\n    newSpan.textContent = newLabel;\n    input.replaceWith(newSpan);\n  }\n  input.addEventListener('blur', finishEdit);\n  input.addEventListener('keydown', function(e) {\n    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }\n    if (e.key === 'Escape') { input.value = current; input.blur(); }\n  });\n}\n\nfunction buildProdNote() {\n  const parts = [];\n  if (chipValues.fm) parts.push(chipValues.fm.charAt(0).toUpperCase()+chipValues.fm.slice(1));\n  if (chipValues.eq) parts.push(chipValues.eq);\n  if (chipValues.en) parts.push(chipValues.en);\n  if (chipValues.cc) parts.push(chipValues.cc.charAt(0).toUpperCase()+chipValues.cc.slice(1));\n  if (chipValues.fmt) parts.push(chipValues.fmt);\n  if (chipValues.inc.length) parts.push('Incluye: '+chipValues.inc.join(', '));\n  // custom categories\n  Object.keys(chipValues).forEach(k => {\n    if (!['fm','eq','en','cc','fmt','inc'].includes(k)) {\n      const catEl = document.getElementById('cat-label-'+k);\n      const catName = catEl ? catEl.textContent.trim() : k;\n      const val = chipValues[k];\n      if (Array.isArray(val) && val.length) parts.push(catName+': '+val.join(', '));\n      else if (val) parts.push(catName+': '+val);\n    }\n  });\n  return parts.join('. ')+(parts.length?'.':'');\n}\n\n/* ============================================================\n   BANCOS\n   ============================================================ */\nlet bancos = JSON.parse(localStorage.getItem('bh_bancos') || '[]');\nlet editBancoId = null;\nlet selectedColor = '#7B2FFF';\n\nfunction openBancoModal(id) {\n  editBancoId = id || null;\n  selectedColor = '#7B2FFF';\n  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));\n  document.querySelector('.color-dot[data-color=\"#7B2FFF\"]').classList.add('active');\n  document.getElementById('bancoModalTitle').textContent = id ? 'Editar cuenta bancaria' : 'Nueva cuenta bancaria';\n  \n  if (id) {\n    const b = bancos.find(x => x.id===id);\n    if (!b) return;\n    document.getElementById('b-banco').value = b.banco;\n    document.getElementById('b-titular').value = b.titular;\n    document.getElementById('b-cuenta').value = b.cuenta;\n    document.getElementById('b-tipo').value = b.tipo;\n    document.getElementById('b-cedula').value = b.cedula;\n    document.getElementById('b-email').value = b.email||'';\n    selectedColor = b.color || '#7B2FFF';\n    document.querySelectorAll('.color-dot').forEach(d => {\n      d.classList.remove('active');\n      if (d.dataset.color === selectedColor) d.classList.add('active');\n    });\n  } else {\n    document.getElementById('b-banco').value = '';\n    document.getElementById('b-titular').value = '';\n    document.getElementById('b-cuenta').value = '';\n    document.getElementById('b-tipo').value = 'Corriente';\n    document.getElementById('b-cedula').value = '';\n    document.getElementById('b-email').value = '';\n  }\n  document.getElementById('bancoModalOverlay').style.display = 'flex';\n}\n\nfunction closeBancoModal() {\n  document.getElementById('bancoModalOverlay').style.display = 'none';\n}\n\nfunction pickColor(el) {\n  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));\n  el.classList.add('active');\n  selectedColor = el.dataset.color;\n}\n\nfunction saveBanco() {\n  const banco = document.getElementById('b-banco').value.trim();\n  const titular = document.getElementById('b-titular').value.trim();\n  const cuenta = document.getElementById('b-cuenta').value.trim();\n  if (!banco || !titular || !cuenta) { toast('Completa banco, titular y cuenta'); return; }\n  \n  if (editBancoId) {\n    const idx = bancos.findIndex(x => x.id===editBancoId);\n    if (idx>=0) {\n      bancos[idx] = { ...bancos[idx],\n        banco, titular, cuenta,\n        tipo: document.getElementById('b-tipo').value,\n        cedula: document.getElementById('b-cedula').value.trim(),\n        email: document.getElementById('b-email').value.trim(),\n        color: selectedColor\n      };\n    }\n  } else {\n    bancos.push({\n      id: Date.now().toString(),\n      banco, titular, cuenta,\n      tipo: document.getElementById('b-tipo').value,\n      cedula: document.getElementById('b-cedula').value.trim(),\n      email: document.getElementById('b-email').value.trim(),\n      color: selectedColor\n    });\n  }\n  localStorage.setItem('bh_bancos', JSON.stringify(bancos));\n  closeBancoModal();\n  renderBancos();\n  toast(editBancoId ? 'Cuenta actualizada' : 'Cuenta guardada ✓');\n}\n\nfunction deleteBanco(id) {\n  if (!confirm('¿Eliminar esta cuenta bancaria?')) return;\n  bancos = bancos.filter(b => b.id !== id);\n  localStorage.setItem('bh_bancos', JSON.stringify(bancos));\n  renderBancos();\n  toast('Cuenta eliminada');\n}\n\nfunction copyBanco(id) {\n  const b = bancos.find(x => x.id===id);\n  if (!b) return;\n  const txt = buildBancoText(b);\n  try {\n    if (navigator.clipboard && window.isSecureContext) {\n      navigator.clipboard.writeText(txt).then(() => toast('Datos copiados ✓')).catch(() => fallbackCopy(txt));\n    } else {\n      fallbackCopy(txt);\n    }\n  } catch(e) { fallbackCopy(txt); }\n}\n\nfunction fallbackCopy(txt) {\n  const ta = document.createElement('textarea');\n  ta.value = txt;\n  ta.style.position = 'fixed';\n  ta.style.opacity = '0';\n  document.body.appendChild(ta);\n  ta.focus();\n  ta.select();\n  try { document.execCommand('copy'); toast('Datos copiados ✓'); }\n  catch(e) { toast('No se pudo copiar'); }\n  document.body.removeChild(ta);\n}\n\nfunction shareBancoWA(id) {\n  const b = bancos.find(x => x.id===id);\n  if (!b) return;\n  const txt = buildBancoText(b);\n  window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(txt));\n}\n\nfunction buildBancoText(b) {\n  let t = '*DATOS BANCARIOS*\\n';\n  t += '----------------------------\\n';\n  t += 'Banco: '+b.banco+'\\n';\n  t += 'Titular: '+b.titular+'\\n';\n  t += 'Cuenta: '+b.cuenta+'\\n';\n  t += 'Tipo: '+b.tipo+'\\n';\n  if (b.cedula) t += 'Cédula/RUC: '+b.cedula+'\\n';\n  if (b.email)  t += 'Email: '+b.email+'\\n';\n  t += '----------------------------';\n  return t;\n}\n\nfunction renderBancos() {\n  var grid = document.getElementById('bancosGrid');\n  if (!grid) return;\n  if (bancos.length === 0) {\n    grid.innerHTML = '<div style=\"grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)\"><div style=\"font-size:14px\">Agrega tus cuentas bancarias para compartirlas facilmente<\u002Fdiv><\u002Fdiv>';\n    return;\n  }\n  var html = '';\n  for (var i = 0; i < bancos.length; i++) {\n    var b = bancos[i];\n    var bid = b.id;\n    var color = b.color || '#7B2FFF';\n    var cd = b.cuenta.length > 8 ? b.cuenta.slice(0,4) + ' **** ' + b.cuenta.slice(-4) : b.cuenta;\n    var cedHtml = b.cedula ? '<div class=\"bc-cedula\">CI/RUC: ' + b.cedula + '<\u002Fdiv>' : '';\n    html += '<div class=\"banco-card\" style=\"background:linear-gradient(135deg,' + color + ',' + color + '88)\">';\n    html += '<div class=\"bc-bank\">' + b.banco + '<\u002Fdiv>';\n    html += '<div class=\"bc-cuenta\">' + cd + '<\u002Fdiv>';\n    html += '<div class=\"bc-tipo\">' + b.tipo + '<\u002Fdiv>';\n    html += '<div class=\"bc-titular\">' + b.titular + '<\u002Fdiv>';\n    html += cedHtml;\n    html += '<div class=\"bc-actions\">';\n    html += '<button class=\"bc-btn\" onclick=\"copyBanco(this.dataset.id)\" data-id=\"' + bid + '\">Copiar<\u002Fbutton>';\n    html += '<button class=\"bc-btn\" onclick=\"shareBancoWA(this.dataset.id)\" data-id=\"' + bid + '\">WhatsApp<\u002Fbutton>';\n    html += '<button class=\"bc-btn\" onclick=\"openBancoModal(this.dataset.id)\" data-id=\"' + bid + '\">Editar<\u002Fbutton>';\n    html += '<button class=\"bc-btn danger\" onclick=\"deleteBanco(this.dataset.id)\" data-id=\"' + bid + '\">Eliminar<\u002Fbutton>';\n    html += '<\u002Fdiv><\u002Fdiv>';\n  }\n  grid.innerHTML = html;\n}\n\n\n<\u002Fscript>\n<script>\n// ── TWEAKS PANEL ──\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentColor\": \"#7B2FFF\",\n  \"heroLogoSize\": 100,\n  \"cardRadius\": 16,\n  \"glowLevel\": \"low\",\n  \"heroFont\": \"Outfit\"\n}/*EDITMODE-END*/;\n\n(function initTweaks() {\n  // Apply saved or default tweaks on load\n  const saved = (() => { try { return JSON.parse(localStorage.getItem('bh_tweaks') || 'null'); } catch(e){ return null; } })();\n  const t = Object.assign({}, TWEAK_DEFAULTS, saved);\n  applyTweakState(t, false);\n\n  // ── HOST PROTOCOL ──\n  window.addEventListener('message', e => {\n    if (e.data && e.data.type === '__activate_edit_mode') showTweaks();\n    if (e.data && e.data.type === '__deactivate_edit_mode') hideTweaks();\n  });\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n  document.getElementById('twCloseBtn').addEventListener('click', () => {\n    hideTweaks();\n    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');\n  });\n})();\n\nfunction showTweaks() { document.getElementById('tweaksPanel').classList.add('open'); }\nfunction hideTweaks() { document.getElementById('tweaksPanel').classList.remove('open'); }\n\nfunction saveTweaks(edits) {\n  const prev = (() => { try { return JSON.parse(localStorage.getItem('bh_tweaks') || '{}'); } catch(e){ return {}; } })();\n  const next = Object.assign({}, prev, edits);\n  localStorage.setItem('bh_tweaks', JSON.stringify(next));\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');\n}\n\nfunction applyTweakState(t, save) {\n  // Accent color\n  if (t.accentColor) {\n    document.documentElement.style.setProperty('--accent', t.accentColor);\n    document.documentElement.style.setProperty('--accent-dark', t.accentColor);\n    document.documentElement.style.setProperty('--accent-glow', t.accentColor + '44');\n    document.documentElement.style.setProperty('--border', t.accentColor + '2e');\n    document.documentElement.style.setProperty('--border-h', t.accentColor + '6a');\n    const cpDot = document.getElementById('cpDot');\n    const cpHex = document.getElementById('cpHex');\n    if (cpDot) cpDot.style.background = t.accentColor;\n    if (cpHex) cpHex.textContent = t.accentColor.toUpperCase();\n    document.querySelectorAll('.tw-sw').forEach(s => s.classList.toggle('active', s.dataset.color === t.accentColor));\n    const customPicker = document.getElementById('customColorPicker');\n    if (customPicker) customPicker.value = t.accentColor;\n  }\n  // Hero logo size\n  if (t.heroLogoSize) {\n    const heroImg = document.getElementById('heroLogoImg');\n    if (heroImg) heroImg.style.height = t.heroLogoSize + 'px';\n    const slider = document.getElementById('twLogoSize');\n    const val = document.getElementById('twLogoSizeVal');\n    if (slider) slider.value = t.heroLogoSize;\n    if (val) val.textContent = t.heroLogoSize + 'px';\n  }\n  // Card radius\n  if (t.cardRadius) {\n    document.documentElement.style.setProperty('--radius', t.cardRadius + 'px');\n    document.documentElement.style.setProperty('--radius-sm', Math.max(4, t.cardRadius - 6) + 'px');\n    const slider = document.getElementById('twRadius');\n    const val = document.getElementById('twRadiusVal');\n    if (slider) slider.value = t.cardRadius;\n    if (val) val.textContent = t.cardRadius + 'px';\n  }\n  // Glow level\n  if (t.glowLevel) {\n    const glows = { low: '0.22', mid: '0.42', high: '0.68' };\n    const g = glows[t.glowLevel] || '0.42';\n    document.documentElement.style.setProperty('--accent-glow', `rgba(110,50,230,${g})`);\n    document.querySelectorAll('.tw-section:nth-child(5) .tw-tog-btn').forEach(b => {\n      const map = { low: 'Suave', mid: 'Medio', high: 'Intenso' };\n      b.classList.toggle('active', b.textContent.trim() === map[t.glowLevel]);\n    });\n  }\n  // Hero font\n  if (t.heroFont) {\n    document.documentElement.style.setProperty('--hv', `'${t.heroFont}', 'Helvetica Neue', Helvetica, sans-serif`);\n    document.querySelectorAll('.tw-section:nth-child(6) .tw-tog-btn').forEach(b => {\n      const map = { Outfit: 'Outfit', 'DM Serif Display': 'Serif', 'Space Grotesk': 'Grotesk' };\n      b.classList.toggle('active', b.textContent.trim() === map[t.heroFont]);\n    });\n  }\n  if (save) saveTweaks(t);\n}\n\nfunction twSetAccent(color, el) {\n  applyTweakState({ accentColor: color }, true);\n  // Also sync the color FAB panel\n  setColor(color, null);\n  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.style.background === color || s.getAttribute('onclick') && s.getAttribute('onclick').includes(color)));\n}\n\nfunction twLogoSize(val) {\n  document.getElementById('twLogoSizeVal').textContent = val + 'px';\n  applyTweakState({ heroLogoSize: parseInt(val) }, true);\n}\n\nfunction twSetRadius(val) {\n  document.getElementById('twRadiusVal').textContent = val + 'px';\n  applyTweakState({ cardRadius: parseInt(val) }, true);\n}\n\nfunction twGlow(level, el) {\n  document.querySelectorAll('.tw-section:nth-child(5) .tw-tog-btn').forEach(b => b.classList.remove('active'));\n  el.classList.add('active');\n  applyTweakState({ glowLevel: level }, true);\n}\n\n// ── DYNAMIC PRINT COLORS ──\nfunction hexToRgb(hex) {\n  hex = hex.replace('#','');\n  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');\n  return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];\n}\nfunction darkenHex(hex, factor) {\n  const [r,g,b] = hexToRgb(hex);\n  return '#' + [r,g,b].map(c => Math.max(0,Math.round(c*factor)).toString(16).padStart(2,'0')).join('');\n}\nfunction mixWithBlack(hex, pct) {\n  const [r,g,b] = hexToRgb(hex);\n  return '#' + [r,g,b].map(c => Math.round(c*pct).toString(16).padStart(2,'0')).join('');\n}\n\nwindow.addEventListener('beforeprint', function() {\n  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#9B6DFF';\n  const dark1 = mixWithBlack(accent, 0.22);\n  const dark2 = mixWithBlack(accent, 0.35);\n  const dark3 = mixWithBlack(accent, 0.16);\n  const light = accent + '18'; // very transparent tint for meta bg\n  const mid   = accent + '2a'; // border tint\n  const style = document.createElement('style');\n  style.id = 'bh-dynamic-print';\n  style.textContent = `\n    @media print {\n      .q-top {\n        background: linear-gradient(135deg, ${dark1} 0%, ${dark2} 45%, ${dark3} 100%) !important;\n      }\n      .q-meta { background: ${light} !important; border-bottom: 2px solid ${mid} !important; }\n      .q-thead { border-bottom: 2px solid ${mid} !important; }\n      .q-totals { background: ${light} !important; border-top: 2px solid ${mid} !important; }\n      .q-note { background: ${light} !important; border-top: 1px solid ${mid} !important; }\n      .q-footer-txt { border-top: 1px solid ${mid} !important; }\n    }\n  `;\n  document.head.appendChild(style);\n});\n\nwindow.addEventListener('afterprint', function() {\n  const s = document.getElementById('bh-dynamic-print');\n  if (s) s.remove();\n});\n\nfunction twFont(font, el) {\n  document.querySelectorAll('.tw-section:nth-child(6) .tw-tog-btn').forEach(b => b.classList.remove('active'));\n  el.classList.add('active');\n  applyTweakState({ heroFont: font }, true);\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
